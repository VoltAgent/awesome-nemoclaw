# Bu preset örnek amaçlıdır. Kullanmadan önce kendi ortamınıza göre düzenleyin.

preset:
  name: notion
  description: "Notion API access (least-privilege example)"

network_policies:
  notion:
    name: notion
    endpoints:
      - host: api.notion.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/v1/**" }
          - allow: { method: POST, path: "/v1/**" }
          - allow: { method: PATCH, path: "/v1/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }
